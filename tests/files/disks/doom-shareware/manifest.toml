[game]
name = "DOOM Shareware"
slug = "doom-shareware"
media = "floppy"
license = "shareware"

[source]
url = "https://archive.org/download/doom-shareware-floppy-v-1.666-2-disk.-7z/Doom%20Shareware%20Floppy%20%28v1.666%29%20%5B2%20Disk%5D.7z"

[discs]
images = ["disk1.ima", "disk2.ima"]

[installer]
path = "SETUP.EXE"
source_drive = "A"
target_drive = "C"

[settings]
cpu_cycles = "12000"

[prompts]
sequence = [
    { wait = "Available Drives", type = "C" },
    { wait = "insert disk DOOM 2", action = "swap:2", key = "enter" },
    { wait = "Controller Type", key = "down" },
    { repeat = "enter", until = "gfx" },
    { pause = 60 },
    { key = "escape" },
    { pause = 15 },
    { key = "up" },
    { pause = 15 },
    { key = "enter" },
    { pause = 15 },
    { key = "y" },
    { repeat = "wait", until = "text" },
]

[verify]
files = ["C:\\GOLD\\DOOM\\DOOM.EXE"]

[capture]
screenshot_at = [0]
