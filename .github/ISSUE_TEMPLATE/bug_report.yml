name:        Bug report
description: File a bug report
title:       Think about the title, twice
labels:      bug
type:        bug

body:
  - type: markdown
    id: intro
    attributes:
      value: |
        ## Please fill out the form completely. Incomplete submissions will be closed!
        #### Make sure that you have:
        - provided a descriptive and succinct title
        - have read all questions carefully have answered **all** of them


  - type: checkboxes
    id: version
    attributes:
      label: Are you using the latest dosbox-automation version?
      description: |
        Look up the latest release version on the [releases page](https://github.com/dosbox-automation/dosbox-automation/releases).
        To check your version, run `dosbox --version` or execute the `VER` command inside dosbox-automation. If the version is reported as `git` (meaning you compiled it yourself), put the result of `git describe` in the version field below.
      options:
        - label: I have checked and I'm using the latest release.
          required: true

  - type: input
    id: verinfo
    attributes:
      label: Different version than latest?
      placeholder: "E.g., 0.83.0-alpha, git version, branch testing"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: What operating system are you using?
      multiple: false
      options:
        - Please select
        - Linux x86_64
        - Windows 11
        - Windows 10
        - Windows 8
        - Windows 7
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Other
    validations:
      required: true

  - type: textarea
    id: other_os
    attributes:
      label: OS details
      description: |
        Don't worry about getting every detail right. Whatever you can provide helps.

        On Linux, this collects the useful bits:
        ```
        cat /etc/os-release | head -4
        echo "Display: ${XDG_SESSION_TYPE:-unknown}"
        glxinfo | grep "OpenGL renderer" 2>/dev/null || echo "glxinfo not available"
        pactl info 2>/dev/null | grep "Server Name" || echo "pactl not available"
        ```

        On Windows, open a command prompt and run:
        ```
        systeminfo | findstr /B /C:"OS Name" /C:"OS Version" /C:"System Type"
        wmic path win32_videocontroller get name
        ```

        If you can't run these, just describe what you know. That's fine too.
      placeholder: "Paste command output or describe your setup"
    validations:
      required: false

  - type: checkboxes
    id: checked-dupes
    attributes:
      label: Have you checked that no other similar issue already exists?
      options:
        - label: I have searched and have not found similar issues.
          required: true

  - type: textarea
    id: description
    attributes:
      label: A clear and concise description of what the bug is
      description: Describe what happens, what software were you running? Try to specify the exact version of the game you're running. _Include screenshots if possible._
      placeholder: "How and when does this occur?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce the behaviour
      description: If we can't reproduce what you're experiencing, we can't fix it. Provide detailed steps on how to reproduce the bug; don't assume we're familiar with the software. For games, you can attach save game file in a ZIP archive if that helps.
      value: |
        Explain in detail how to reproduce the bug. Assume no familiarity with the software.
        1. 
        2.
        3.
    validations:
      required: false

  - type: input
    id: package_url
    attributes:
      label: Download URL of affected game or software
      description: |
        If a single game or program is affected, provide a download link to ensure we're using binary-exact files and version(s).
        This is _required_ unless the issue broadly applies.
      placeholder: "E.g., https://archive.org/details/DungeonHackDemo"
    validations:
      required: false

  - type: textarea
    id: config_file
    attributes:
      label: Your configuration
      description: |
        Share the config file(s) you are using to run the program. (`dosbox-automation.conf`) 
        Please avoid pasting the full config; _use attachments or links_ in a [Gist](https://gist.github.com/) instead.
      placeholder: "Your configuration (if short), or provide Gist link"
      render: ini # syntax highlighting
    validations:
      required: false

  - type: textarea
    id: log
    attributes:
      label: Provide a log or screenshot of the log window
      description: A screenshot of the dosbox-automation log window is often enough. For longer logs, use attachments or a [Gist](https://gist.github.com/).
      placeholder: "Drag a screenshot here, paste a short log, or provide a Gist link"
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Code of conduct and contributing guidelines
      description: By submitting this issue, you agree to follow our [contributing guidelines](https://github.com/dosbox-automation/dosbox-automation/blob/master/docs/CONTRIBUTING.md) and [code of conduct](https://github.com/dosbox-automation/dosbox-automation/blob/master/docs/CODE_OF_CONDUCT.md).
      options:
        - label: Yes, I agree.
          required: true
